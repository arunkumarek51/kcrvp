name: kcrvp_mobile
description: Kerala Carbon Registry and Verification Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^12.1.1

  # State management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.0

  # HTTP & API
  dio: ^5.3.3
  http: ^1.1.0

  # Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  shared_preferences: ^2.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Camera & Images
  image_picker: ^1.0.5
  camera: ^0.10.5+5
  cached_network_image: ^3.3.0

  # Charts
  fl_chart: ^0.65.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1
  image_cropper: ^5.0.1
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora-ExtraBold.ttf
          weight: 800
